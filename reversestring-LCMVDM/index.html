<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #2a2a3d;
            --accent: #ff3c5a;
            --accent2: #00f5c4;
            --text: #e8e8f0;
            --muted: #555570;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 60% 40%, rgba(255, 60, 90, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 30% 70%, rgba(0, 245, 196, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
        }

        header {
            margin-bottom: 3rem;
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--accent2);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 10vw, 6rem);
            line-height: 0.9;
            letter-spacing: 0.02em;
            color: var(--text);
        }

        h1 span {
            color: var(--accent);
            display: block;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2.5rem;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .field-label {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            padding: 1rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--accent2);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s, opacity 0.3s, transform 0.3s;
            white-space: nowrap;
            display: none;
            opacity: 0;
            transform: scale(0.85);
        }

        .btn.visible {
            display: inline-block;
            opacity: 1;
            transform: scale(1);
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .output-section {
            margin-top: 0;
        }

        .output-box {
            width: 100%;
            background: rgba(0, 245, 196, 0.03);
            border: 1px solid var(--border);
            color: var(--accent2);
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            padding: 1rem;
            min-height: 100px;
            line-height: 1.6;
            word-break: break-all;
            white-space: pre-wrap;
            transition: all 0.3s;
        }

        .output-box.has-content {
            border-color: rgba(0, 245, 196, 0.3);
        }

        .output-box.flash {
            animation: flash 0.3s ease;
        }

        @keyframes flash {
            0% { opacity: 1; }
            30% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
        }

        .copy-btn:hover {
            color: var(--accent2);
        }

        .copy-btn.copied {
            color: var(--accent2);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="label">// utilidad de texto</p>
            <h1>REVERSE<span>STRING</span></h1>
        </header>

        <div class="card">
            <div>
                <p class="field-label">// entrada</p>
                <textarea id="input" placeholder="Escribe o pega tu texto aquí…"></textarea>
            </div>

            <div class="divider">
                <div class="divider-line"></div>
                <button class="btn" id="reverseBtn">⟵ invertir</button>
                <div class="divider-line"></div>
            </div>

            <div class="output-section">
                <p class="field-label">// resultado</p>
                <div class="output-box" id="output">—</div>
                <div class="meta-row">
                    <span id="charCount">0 caracteres</span>
                    <button class="copy-btn" id="copyBtn">copiar resultado</button>
                </div>
            </div>
        </div>

        <footer>AI4Devs · REVERSE STRING TOOL</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
